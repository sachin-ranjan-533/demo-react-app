apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-react-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-react-app
  template:
    metadata:
      labels:
        app: demo-react-app
    spec:
      containers:
      - name: demo-react-app
        image: 643603452519.dkr.ecr.eu-north-1.amazonaws.com/demo-react-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: demo-react-service
spec:
  type: LoadBalancer
  selector:
    app: demo-react-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80